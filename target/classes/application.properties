spring.application.name=Estoque-RealCar

# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/

# ===============================
# DATABASE - MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/realcar_estoque?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=Abdiel
spring.datasource.password=Abdiel@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.estoque.realcar=DEBUG
logging.level.org.springframework.web=DEBUG

# ===============================
# JACKSON
# ===============================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false



