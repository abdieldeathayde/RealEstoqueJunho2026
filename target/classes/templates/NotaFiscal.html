<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissão de Nota Fiscal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

<div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
    <header class="mb-8 border-b border-slate-200 pb-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Nova Nota Fiscal</h1>
            <p class="text-sm text-slate-500">Insira os dados correspondentes para faturamento e registro.</p>
        </div>
        <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-1 rounded-full border border-blue-200">Modelo 55</span>
    </header>

    <form id="formNotaFiscal" class="space-y-6">

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-blue-600 mb-4">1. Dados Gerais da Nota</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Natureza da Operação</label>
                    <input type="text" name="naturezaOperacao" placeholder="Ex: Venda de Mercadoria" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Número</label>
                    <input type="text" name="numero" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Série</label>
                    <input type="text" name="serie" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Data/Hora Emissão</label>
                    <input type="datetime-local" name="dataHoraEmissao" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-blue-600 mb-4">2. Dados do Emitente / Destinatário</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-slate-600 mb-1">Nome / Razão Social</label>
                    <input type="text" name="razaoSocial" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">CNPJ / CPF</label>
                    <input type="text" name="cnpjCpf" placeholder="00.000.000/0000-00" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Inscrição Estadual</label>
                    <input type="text" name="inscricaoEstadual" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">IE do Subst. Tributário</label>
                    <input type="text" name="inscricaoEstadualSt" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Telefone</label>
                    <input type="text" name="fone" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-slate-600 mb-1">Endereço</label>
                    <input type="text" name="endereco" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Bairro</label>
                    <input type="text" name="bairro" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">CEP</label>
                    <input type="text" name="cep" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs font-medium text-slate-600 mb-1">Município</label>
                    <input type="text" name="municipio" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">UF</label>
                    <input type="text" name="uf" maxLength="2" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none uppercase">
                </div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-blue-600">3. Dados dos Produtos / Serviços</h2>
                <button type="button" id="btnAdicionarItem" class="bg-slate-900 hover:bg-slate-800 text-white text-xs font-medium px-3 py-2 rounded-lg transition-colors">
                    + Adicionar Item
                </button>
            </div>

            <div class="overflow-x-auto border border-slate-200 rounded-lg">
                <table class="min-w-full divide-y divide-slate-200 text-left text-xs" id="tabelaItens">
                    <thead class="bg-slate-50 text-slate-700 uppercase font-medium">
                    <tr>
                        <th class="p-3">Código</th>
                        <th class="p-3 w-1/4">Descrição</th>
                        <th class="p-3">NCM</th>
                        <th class="p-3">CST</th>
                        <th class="p-3">CFOP</th>
                        <th class="p-3">UN</th>
                        <th class="p-3">Qtd</th>
                        <th class="p-3">Vl. Unit</th>
                        <th class="p-3">Vl. Total</th>
                        <th class="p-3">Ações</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 bg-white">
                    </tbody>
                </table>
            </div>
        </section>

        <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-blue-600 mb-4">4. Cálculos de Impostos e Totais</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Bc. ICMS</label>
                    <input type="number" step="0.01" name="baseCalculoIcms" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Valor ICMS</label>
                    <input type="number" step="0.01" name="valorIcms" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Bc. ICMS ST</label>
                    <input type="number" step="0.01" name="baseCalculoIcmsSt" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Valor ICMS ST</label>
                    <input type="number" step="0.01" name="valorIcmsSt" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Vl. Total Produtos</label>
                    <input type="number" step="0.01" name="valorTotalProdutos" class="w-full text-sm border border-slate-300 rounded-lg p-2 bg-slate-50 font-semibold" readonly>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Valor do Frete</label>
                    <input type="number" step="0.01" name="valorFrete" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Valor Seguro</label>
                    <input type="number" step="0.01" name="valorSeguro" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Desconto</label>
                    <input type="number" step="0.01" name="desconto" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1">Valor IPI</label>
                    <input type="number" step="0.01" name="valorIpi" class="w-full text-sm border border-slate-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-1 text-blue-700">Valor Total Nota</label>
                    <input type="number" step="0.01" name="valorTotalNota" class="w-full text-sm border border-blue-300 bg-blue-50 text-blue-900 rounded-lg p-2 font-bold focus:ring-2 focus:ring-blue-500" readonly>
                </div>
            </div>
        </section>

        <div class="flex justify-end space-x-3 pt-4">
            <button type="button" class="px-5 py-2.5 border border-slate-300 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-100 transition-colors">Cancelar</button>
            <button type="submit" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg shadow-sm transition-colors">Salvar Nota Fiscal</button>
        </div>
    </form>
</div>

<script>
    const tabelaItens = document.getElementById('tabelaItens').getElementsByTagName('tbody')[0];
    const btnAdicionarItem = document.getElementById('btnAdicionarItem');
    const form = document.getElementById('formNotaFiscal');

    // Adiciona uma linha de item dinâmica ao carregar e ao clicar no botão
    function criarLinhaItem() {
        const row = tabelaItens.insertRow();
        row.className = "hover:bg-slate-50 transition-colors input-item-row";
        row.innerHTML = `
                <td class="p-2"><input type="text" class="w-16 border rounded p-1" data-field="codigo"></td>
                <td class="p-2"><input type="text" class="w-full border rounded p-1" data-field="descricao"></td>
                <td class="p-2"><input type="text" class="w-16 border rounded p-1" data-field="ncm"></td>
                <td class="p-2"><input type="text" class="w-12 border rounded p-1" data-field="cst"></td>
                <td class="p-2"><input type="text" class="w-12 border rounded p-1" data-field="cfop"></td>
                <td class="p-2"><input type="text" class="w-10 border rounded p-1" data-field="unidade"></td>
                <td class="p-2"><input type="number" class="w-14 border rounded p-1" data-field="quantidade" oninput="calcularTotalItem(this)"></td>
                <td class="p-2"><input type="number" step="0.01" class="w-20 border rounded p-1" data-field="valorUnitario" oninput="calcularTotalItem(this)"></td>
                <td class="p-2"><input type="number" step="0.01" class="w-20 border bg-slate-50 rounded p-1 font-medium" data-field="valorTotal" readonly></td>
                <td class="p-2 text-center"><button type="button" onclick="this.closest('tr').remove(); atualizarTotaisNota();" class="text-red-500 hover:text-red-700 font-semibold">✕</button></td>
            `;
    }

    btnAdicionarItem.addEventListener('click', criarLinhaItem);
    window.addEventListener('DOMContentLoaded', criarLinhaItem); // Inicia com 1 item padrão

    function calcularTotalItem(input) {
        const row = input.closest('tr');
        const qtd = parseFloat(row.querySelector('[data-field="quantidade"]').value) || 0;
        const valUnit = parseFloat(row.querySelector('[data-field="valorUnitario"]').value) || 0;
        const totalInput = row.querySelector('[data-field="valorTotal"]');

        totalInput.value = (qtd * valUnit).toFixed(2);
        atualizarTotaisNota();
    }

    function atualizarTotaisNota() {
        let totalProdutos = 0;
        document.querySelectorAll('[data-field="valorTotal"]').forEach(input => {
            totalProdutos += parseFloat(input.value) || 0;
        });

        form.querySelector('[name="valorTotalProdutos"]').value = totalProdutos.toFixed(2);

        // Cálculo simplificado do Total da Nota
        const frete = parseFloat(form.querySelector('[name="valorFrete"]').value) || 0;
        const seguro = parseFloat(form.querySelector('[name="valorSeguro"]').value) || 0;
        const desconto = parseFloat(form.querySelector('[name="desconto"]').value) || 0;
        const ipi = parseFloat(form.querySelector('[name="valorIpi"]').value) || 0;

        const totalNota = (totalProdutos + frete + seguro + ipi) - desconto;
        form.querySelector('[name="valorTotalNota"]').value = totalNota.toFixed(2);
    }

    // Eventos adicionais para recalcular quando mudarem os inputs adicionais
    ['valorFrete', 'valorSeguro', 'desconto', 'valorIpi'].forEach(name => {
        form.querySelector(`[name="${name}"]`).addEventListener('input', atualizarTotaisNota);
    });

    // Envio do formulário via API para o Backend Spring
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = new FormData(form);
        const notaFiscal = Object.fromEntries(formData.entries());

        // Captura os itens da tabela dinamicamente
        notaFiscal.itens = [];
        document.querySelectorAll('.input-item-row').forEach(row => {
            const item = {};
            row.querySelectorAll('[data-field]').forEach(input => {
                item[input.getAttribute('data-field')] = input.value;
            });
            if(item.descricao) { // Apenas adiciona se tiver descrição
                notaFiscal.itens.push(item);
            }
        });

        try {
            const response = await fetch('http://localhost:8080/api/notas-fiscais', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(notaFiscal)
            });

            if (response.ok) {
                alert('Nota Fiscal gravada com sucesso no MySQL!');
                form.reset();
                tabelaItens.innerHTML = '';
                criarLinhaItem();
            } else {
                alert('Falha ao salvar nota fiscal.');
            }
        } catch (error) {
            console.error('Erro na requisição:', error);
            alert('Erro de conexão com o backend.');
        }
    });
</script>
</body>
</html>
