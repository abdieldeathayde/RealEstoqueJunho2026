<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Estoque</title>


    <link rel="stylesheet" href="../static/cadastro.css">

</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">

        <input
                type="text"
                id="username"
                placeholder="Usuário"
                required
        />

        <input
                type="password"
                id="password"
                placeholder="Senha"
                required
        />

        <button type="submit">Entrar</button>

        <p id="mensagem"></p>

    </form>
</div>




<script src="../static/login.js"></script>


</body>
</html>
